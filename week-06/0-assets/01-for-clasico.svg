<svg width="820" height="460" viewBox="0 0 820 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="820" height="460" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#F0DB4F">Bucle for — Anatomía y Flujo</text>

  <!-- ══════════════════════════════════════ -->
  <!-- Panel izquierdo: Anatomía del código  -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="58" width="400" height="200" rx="10" fill="#16213e" stroke="#2d2d5e" stroke-width="1.5"/>
  <text x="230" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Anatomía</text>

  <!-- Código -->
  <text x="55" y="110" font-size="14" font-family="monospace" fill="#e2e8f0">for (</text>
  <text x="55" y="135" font-size="14" font-family="monospace" fill="#4fc3f7">  let i = 0</text>
  <text x="190" y="135" font-size="14" font-family="monospace" fill="#e2e8f0">;</text>
  <text x="55" y="160" font-size="14" font-family="monospace" fill="#81c784">  i &lt; 5</text>
  <text x="140" y="160" font-size="14" font-family="monospace" fill="#e2e8f0">;</text>
  <text x="55" y="185" font-size="14" font-family="monospace" fill="#ce93d8">  i++</text>
  <text x="55" y="210" font-size="14" font-family="monospace" fill="#e2e8f0">) {</text>
  <text x="55" y="232" font-size="14" font-family="monospace" fill="#ffd54f">  console.log(i);</text>
  <text x="55" y="250" font-size="14" font-family="monospace" fill="#e2e8f0">}</text>

  <!-- Etiquetas con líneas -->
  <!-- Inicialización -->
  <line x1="195" y1="135" x2="260" y2="135" stroke="#4fc3f7" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="260" y="122" width="155" height="24" rx="5" fill="#1e3a5f"/>
  <text x="337" y="138" text-anchor="middle" font-size="12" fill="#4fc3f7">Inicialización (1 vez)</text>

  <!-- Condición -->
  <line x1="145" y1="160" x2="260" y2="160" stroke="#81c784" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="260" y="148" width="155" height="24" rx="5" fill="#1a3c2e"/>
  <text x="337" y="164" text-anchor="middle" font-size="12" fill="#81c784">Condición (cada vuelta)</text>

  <!-- Actualización -->
  <line x1="100" y1="185" x2="260" y2="185" stroke="#ce93d8" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="260" y="173" width="155" height="24" rx="5" fill="#2d1a3e"/>
  <text x="337" y="189" text-anchor="middle" font-size="12" fill="#ce93d8">Actualización (cada fin)</text>

  <!-- Cuerpo -->
  <line x1="200" y1="232" x2="260" y2="232" stroke="#ffd54f" stroke-width="1.5" stroke-dasharray="4 3"/>
  <rect x="260" y="220" width="155" height="24" rx="5" fill="#3d3100"/>
  <text x="337" y="236" text-anchor="middle" font-size="12" fill="#ffd54f">Cuerpo del bucle</text>

  <!-- ══════════════════════════════════ -->
  <!-- Panel derecho: Diagrama de flujo  -->
  <!-- ══════════════════════════════════ -->
  <rect x="450" y="58" width="340" height="360" rx="10" fill="#16213e" stroke="#2d2d5e" stroke-width="1.5"/>
  <text x="620" y="80" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Flujo de Ejecución</text>

  <!-- INICIO -->
  <rect x="566" y="92" width="108" height="32" rx="16" fill="#2d2d5e"/>
  <text x="620" y="113" text-anchor="middle" font-size="12" fill="#e2e8f0">INICIO</text>

  <!-- Flecha inicio → init -->
  <line x1="620" y1="124" x2="620" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Inicialización (rectángulo) -->
  <rect x="540" y="142" width="160" height="34" rx="6" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="620" y="163" text-anchor="middle" font-size="12" fill="#4fc3f7">let i = 0</text>

  <!-- Flecha init → condicion -->
  <line x1="620" y1="176" x2="620" y2="194" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Condición (rombo) -->
  <polygon points="620,194 680,220 620,246 560,220" fill="#1a3c2e" stroke="#81c784" stroke-width="1.5"/>
  <text x="620" y="224" text-anchor="middle" font-size="12" fill="#81c784">i &lt; 5</text>

  <!-- false → FIN (derecha) -->
  <line x1="680" y1="220" x2="730" y2="220" stroke="#e57373" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="706" y="213" text-anchor="middle" font-size="11" fill="#e57373">false</text>
  <rect x="730" y="204" width="44" height="30" rx="15" fill="#2d2d5e"/>
  <text x="752" y="223" text-anchor="middle" font-size="11" fill="#e2e8f0">FIN</text>

  <!-- true → cuerpo -->
  <line x1="620" y1="246" x2="620" y2="264" stroke="#81c784" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="632" y="260" font-size="11" fill="#81c784">true</text>

  <!-- Cuerpo -->
  <rect x="538" y="264" width="164" height="34" rx="6" fill="#3d3100" stroke="#ffd54f" stroke-width="1.5"/>
  <text x="620" y="285" text-anchor="middle" font-size="12" fill="#ffd54f">console.log(i)</text>

  <!-- Flecha cuerpo → actualización -->
  <line x1="620" y1="298" x2="620" y2="316" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Actualización -->
  <rect x="554" y="316" width="132" height="34" rx="6" fill="#2d1a3e" stroke="#ce93d8" stroke-width="1.5"/>
  <text x="620" y="337" text-anchor="middle" font-size="12" fill="#ce93d8">i++</text>

  <!-- Flecha de vuelta a condición (curva izq) -->
  <path d="M 554 333 Q 510 333 510 220 Q 510 194 560 194" fill="none" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="5 3"/>

  <!-- ══════════════════════════════ -->
  <!-- Panel inferior: traza i = 0..4 -->
  <!-- ══════════════════════════════ -->
  <rect x="30" y="275" width="400" height="130" rx="10" fill="#16213e" stroke="#2d2d5e" stroke-width="1.5"/>
  <text x="230" y="296" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Traza de ejecución (i = 0 a 4)</text>

  <!-- Cabecera tabla -->
  <text x="80" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#4fc3f7">i</text>
  <text x="175" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#81c784">i &lt; 5</text>
  <text x="285" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#ffd54f">console.log</text>
  <text x="385" y="318" text-anchor="middle" font-size="12" font-weight="600" fill="#ce93d8">i++ después</text>
  <line x1="45" y1="324" x2="415" y2="324" stroke="#2d2d5e" stroke-width="1"/>

  <!-- Filas -->
  <text x="80" y="341" text-anchor="middle" font-size="12" fill="#e2e8f0">0</text>
  <text x="175" y="341" text-anchor="middle" font-size="12" fill="#81c784">true</text>
  <text x="285" y="341" text-anchor="middle" font-size="12" fill="#ffd54f">0</text>
  <text x="385" y="341" text-anchor="middle" font-size="12" fill="#ce93d8">1</text>

  <text x="80" y="358" text-anchor="middle" font-size="12" fill="#e2e8f0">1</text>
  <text x="175" y="358" text-anchor="middle" font-size="12" fill="#81c784">true</text>
  <text x="285" y="358" text-anchor="middle" font-size="12" fill="#ffd54f">1</text>
  <text x="385" y="358" text-anchor="middle" font-size="12" fill="#ce93d8">2</text>

  <text x="80" y="375" text-anchor="middle" font-size="12" fill="#e2e8f0">3</text>
  <text x="175" y="375" text-anchor="middle" font-size="12" fill="#81c784">true</text>
  <text x="285" y="375" text-anchor="middle" font-size="12" fill="#ffd54f">3</text>
  <text x="385" y="375" text-anchor="middle" font-size="12" fill="#ce93d8">4</text>

  <text x="80" y="392" text-anchor="middle" font-size="12" fill="#e2e8f0">5</text>
  <text x="175" y="392" text-anchor="middle" font-size="12" fill="#e57373">false</text>
  <text x="285" y="392" text-anchor="middle" font-size="12" fill="#94a3b8">—</text>
  <text x="385" y="392" text-anchor="middle" font-size="12" fill="#94a3b8">bucle termina</text>

  <!-- Marcador de flecha -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

</svg>
