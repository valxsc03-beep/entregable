<svg width="820" height="400" viewBox="0 0 820 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="820" height="400" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="410" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#F0DB4F">for...of — Iteración sobre Colecciones</text>

  <!-- ══════════════════════════════════════════ -->
  <!-- Panel superior: Array visual               -->
  <!-- ══════════════════════════════════════════ -->
  <rect x="30" y="54" width="760" height="110" rx="10" fill="#16213e" stroke="#2d2d5e" stroke-width="1.5"/>
  <text x="410" y="76" text-anchor="middle" font-size="13" font-weight="600" fill="#94a3b8">Array: const fruits = ["manzana", "pera", "uva", "mango"]</text>

  <!-- Celdas del array -->
  <!-- manzana -->
  <rect x="70" y="88" width="140" height="50" rx="6" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="140" y="108" text-anchor="middle" font-size="11" fill="#94a3b8">índice [0]</text>
  <text x="140" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#4fc3f7">"manzana"</text>

  <!-- pera -->
  <rect x="230" y="88" width="140" height="50" rx="6" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="300" y="108" text-anchor="middle" font-size="11" fill="#94a3b8">índice [1]</text>
  <text x="300" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#4fc3f7">"pera"</text>

  <!-- uva -->
  <rect x="390" y="88" width="140" height="50" rx="6" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="460" y="108" text-anchor="middle" font-size="11" fill="#94a3b8">índice [2]</text>
  <text x="460" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#4fc3f7">"uva"</text>

  <!-- mango -->
  <rect x="550" y="88" width="140" height="50" rx="6" fill="#1e3a5f" stroke="#4fc3f7" stroke-width="1.5"/>
  <text x="620" y="108" text-anchor="middle" font-size="11" fill="#94a3b8">índice [3]</text>
  <text x="620" y="128" text-anchor="middle" font-size="13" font-weight="600" fill="#4fc3f7">"mango"</text>

  <!-- Flechas de acceso (for...of toma valores directamente) -->
  <text x="698" y="96" font-size="22" fill="#81c784">←</text>
  <text x="752" y="110" text-anchor="middle" font-size="10" fill="#81c784">for...of</text>
  <text x="752" y="124" text-anchor="middle" font-size="10" fill="#81c784">toma valores</text>

  <!-- ═══════════════════════════════════════════════ -->
  <!-- Panel izquierdo: for clásico vs for...of        -->
  <!-- ═══════════════════════════════════════════════ -->
  <rect x="30" y="178" width="370" height="200" rx="10" fill="#16213e" stroke="#e57373" stroke-width="1.5"/>
  <text x="215" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#e57373">for clásico (con índice)</text>

  <rect x="50" y="210" width="330" height="100" rx="6" fill="#0d1117"/>
  <text x="65" y="232" font-size="13" font-family="monospace" fill="#e57373">for (</text>
  <text x="100" y="232" font-size="13" font-family="monospace" fill="#4fc3f7">let i = 0</text>
  <text x="194" y="232" font-size="13" font-family="monospace" fill="#e57373">;</text>
  <text x="65" y="252" font-size="13" font-family="monospace" fill="#81c784">     i &lt; fruits.length</text>
  <text x="65" y="272" font-size="13" font-family="monospace" fill="#ce93d8">     i++</text>
  <text x="65" y="292" font-size="13" font-family="monospace" fill="#e57373">) {</text>
  <text x="65" y="308" font-size="13" font-family="monospace" fill="#ffd54f">  console.log(fruits[i]);</text>

  <text x="215" y="358" text-anchor="middle" font-size="11" fill="#94a3b8">Necesitas gestionar el índice manualmente</text>
  <text x="215" y="374" text-anchor="middle" font-size="11" fill="#94a3b8">Útil cuando necesitas la posición</text>

  <!-- ═══════════════════════════════════════ -->
  <!-- Panel derecho: for...of limpio         -->
  <!-- ═══════════════════════════════════════ -->
  <rect x="420" y="178" width="370" height="200" rx="10" fill="#16213e" stroke="#81c784" stroke-width="1.5"/>
  <text x="605" y="200" text-anchor="middle" font-size="13" font-weight="600" fill="#81c784">for...of (valor directo) ✅ Preferido</text>

  <rect x="440" y="210" width="330" height="100" rx="6" fill="#0d1117"/>
  <text x="455" y="232" font-size="13" font-family="monospace" fill="#81c784">for (</text>
  <text x="498" y="232" font-size="13" font-family="monospace" fill="#ffd54f">const fruit</text>
  <text x="593" y="232" font-size="13" font-family="monospace" fill="#81c784"> of </text>
  <text x="618" y="232" font-size="13" font-family="monospace" fill="#4fc3f7">fruits</text>
  <text x="661" y="232" font-size="13" font-family="monospace" fill="#81c784">) {</text>
  <text x="455" y="270" font-size="13" font-family="monospace" fill="#ffd54f">  console.log(fruit);</text>
  <text x="455" y="300" font-size="13" font-family="monospace" fill="#81c784">}</text>

  <!-- Output -->
  <text x="455" y="318" font-size="12" font-family="monospace" fill="#94a3b8">// manzana  pera  uva  mango</text>

  <text x="605" y="355" text-anchor="middle" font-size="11" fill="#81c784">Sin índices, más legible</text>
  <text x="605" y="372" text-anchor="middle" font-size="11" fill="#81c784">Usa const — el valor no se reasigna</text>

</svg>
