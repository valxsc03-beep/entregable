<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="800" height="420" fill="#1a1a2e" rx="12"/>

  <!-- Título -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#F0DB4F">El Ciclo Fundamental de un Programa</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#a0aec0">Todo programa recibe datos, los procesa y produce un resultado</text>

  <!-- ── ENTRADA ── -->
  <rect x="50" y="110" width="180" height="160" rx="10" fill="#16213e" stroke="#4299e1" stroke-width="2"/>
  <text x="140" y="145" text-anchor="middle" font-size="15" font-weight="700" fill="#4299e1">ENTRADA</text>
  <line x1="70" y1="158" x2="210" y2="158" stroke="#2d3748" stroke-width="1"/>
  <text x="140" y="180" text-anchor="middle" font-size="12" fill="#90cdf4">Datos que el programa</text>
  <text x="140" y="197" text-anchor="middle" font-size="12" fill="#90cdf4">recibe del exterior</text>
  <text x="140" y="222" text-anchor="middle" font-size="11" fill="#718096">Nombre del usuario</text>
  <text x="140" y="239" text-anchor="middle" font-size="11" fill="#718096">Precio de un producto</text>
  <text x="140" y="256" text-anchor="middle" font-size="11" fill="#718096">Temperatura actual</text>

  <!-- Flecha ENTRADA → PROCESO -->
  <line x1="230" y1="190" x2="290" y2="190" stroke="#F0DB4F" stroke-width="2.5"/>
  <polygon points="290,183 305,190 290,197" fill="#F0DB4F"/>

  <!-- ── PROCESO ── -->
  <rect x="305" y="110" width="190" height="160" rx="10" fill="#16213e" stroke="#F0DB4F" stroke-width="2.5"/>
  <text x="400" y="145" text-anchor="middle" font-size="15" font-weight="700" fill="#F0DB4F">PROCESO</text>
  <line x1="325" y1="158" x2="475" y2="158" stroke="#2d3748" stroke-width="1"/>
  <text x="400" y="180" text-anchor="middle" font-size="12" fill="#fefcbf">Las instrucciones que</text>
  <text x="400" y="197" text-anchor="middle" font-size="12" fill="#fefcbf">dan sentido al programa</text>
  <text x="400" y="222" text-anchor="middle" font-size="11" fill="#718096">Calcular el total</text>
  <text x="400" y="239" text-anchor="middle" font-size="11" fill="#718096">Decidir si es válido</text>
  <text x="400" y="256" text-anchor="middle" font-size="11" fill="#718096">Ordenar una lista</text>

  <!-- Flecha PROCESO → SALIDA -->
  <line x1="495" y1="190" x2="555" y2="190" stroke="#F0DB4F" stroke-width="2.5"/>
  <polygon points="555,183 570,190 555,197" fill="#F0DB4F"/>

  <!-- ── SALIDA ── -->
  <rect x="570" y="110" width="180" height="160" rx="10" fill="#16213e" stroke="#68d391" stroke-width="2"/>
  <text x="660" y="145" text-anchor="middle" font-size="15" font-weight="700" fill="#68d391">SALIDA</text>
  <line x1="590" y1="158" x2="730" y2="158" stroke="#2d3748" stroke-width="1"/>
  <text x="660" y="180" text-anchor="middle" font-size="12" fill="#9ae6b4">El resultado que el</text>
  <text x="660" y="197" text-anchor="middle" font-size="12" fill="#9ae6b4">programa produce</text>
  <text x="660" y="222" text-anchor="middle" font-size="11" fill="#718096">"Hola, María"</text>
  <text x="660" y="239" text-anchor="middle" font-size="11" fill="#718096">Total: $350</text>
  <text x="660" y="256" text-anchor="middle" font-size="11" fill="#718096">Lista ordenada</text>

  <!-- ── EJEMPLO CONCRETO ── -->
  <rect x="50" y="300" width="700" height="90" rx="8" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="400" y="323" text-anchor="middle" font-size="12" font-weight="700" fill="#a0aec0">EJEMPLO: Calculadora de precio con descuento</text>

  <!-- entrada ejemplo -->
  <rect x="70" y="334" width="185" height="44" rx="6" fill="#1a365d"/>
  <text x="162" y="352" text-anchor="middle" font-size="11" fill="#90cdf4">precio = 100</text>
  <text x="162" y="368" text-anchor="middle" font-size="11" fill="#90cdf4">descuento = 20</text>

  <!-- flecha ejemplo -->
  <line x1="255" y1="356" x2="290" y2="356" stroke="#F0DB4F" stroke-width="1.5"/>
  <polygon points="290,351 300,356 290,361" fill="#F0DB4F"/>

  <!-- proceso ejemplo -->
  <rect x="300" y="334" width="200" height="44" rx="6" fill="#2d3300"/>
  <text x="400" y="352" text-anchor="middle" font-size="11" fill="#fefcbf">total = precio * (1 - descuento / 100)</text>
  <text x="400" y="368" text-anchor="middle" font-size="11" fill="#fefcbf">total = 100 * 0.80 = 80</text>

  <!-- flecha ejemplo -->
  <line x1="500" y1="356" x2="535" y2="356" stroke="#F0DB4F" stroke-width="1.5"/>
  <polygon points="535,351 545,356 535,361" fill="#F0DB4F"/>

  <!-- salida ejemplo -->
  <rect x="545" y="334" width="185" height="44" rx="6" fill="#1c4532"/>
  <text x="637" y="352" text-anchor="middle" font-size="11" fill="#9ae6b4">"Precio final: $80"</text>
  <text x="637" y="368" text-anchor="middle" font-size="11" fill="#9ae6b4">console.log(...)</text>

</svg>
