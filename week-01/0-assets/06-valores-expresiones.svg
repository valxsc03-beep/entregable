<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" width="800" height="460" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="800" height="460" fill="#1a1a2e" rx="12"/>

  <!-- Título -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#F0DB4F">Valores y Expresiones</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#a0aec0">Entender cómo JavaScript evalúa el código</text>

  <!-- ══════════ LITERAL ══════════ -->
  <rect x="30" y="84" width="355" height="260" rx="10" fill="#16213e" stroke="#4299e1" stroke-width="2"/>
  <rect x="30" y="84" width="355" height="36" rx="10" fill="#1a365d"/>
  <rect x="30" y="106" width="355" height="14" fill="#1a365d"/>
  <text x="207" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#4299e1">Valor Literal</text>
  <text x="207" y="124" text-anchor="middle" font-size="11" fill="#90cdf4">Un dato escrito directamente tal como es</text>

  <rect x="46" y="132" width="323" height="100" rx="6" fill="#0d1117"/>
  <!-- literales -->
  <text x="58" y="154" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">// Literales — el valor ya ES lo que escribes</text>
  <text x="58" y="175" font-size="11" font-family="'Courier New', monospace" fill="#90cdf4">42</text>
  <text x="110" y="175" font-size="11" font-family="'Courier New', monospace" fill="#718096">          // ← el número cuarenta y dos</text>
  <text x="58" y="193" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">'hola'</text>
  <text x="110" y="193" font-size="11" font-family="'Courier New', monospace" fill="#718096">       // ← el texto hola</text>
  <text x="58" y="211" font-size="11" font-family="'Courier New', monospace" fill="#9f7aea">true</text>
  <text x="110" y="211" font-size="11" font-family="'Courier New', monospace" fill="#718096">         // ← el booleano true</text>

  <!-- tag -->
  <rect x="46" y="244" width="323" height="88" rx="6" fill="#1a365d" opacity="0.5"/>
  <text x="207" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#90cdf4">Analogía</text>
  <text x="207" y="288" text-anchor="middle" font-size="12" fill="#a0aec0">Como decir el número "5" en voz alta.</text>
  <text x="207" y="306" text-anchor="middle" font-size="12" fill="#a0aec0">No necesitas calcularlo — ya lo sabes.</text>
  <text x="207" y="322" text-anchor="middle" font-size="11" fill="#4299e1">El valor es inmediato y obvio.</text>

  <!-- ══════════ EXPRESIÓN ══════════ -->
  <rect x="415" y="84" width="355" height="260" rx="10" fill="#16213e" stroke="#68d391" stroke-width="2"/>
  <rect x="415" y="84" width="355" height="36" rx="10" fill="#1c4532"/>
  <rect x="415" y="106" width="355" height="14" fill="#1c4532"/>
  <text x="592" y="108" text-anchor="middle" font-size="14" font-weight="700" fill="#68d391">Expresión</text>
  <text x="592" y="124" text-anchor="middle" font-size="11" fill="#9ae6b4">Código que JavaScript evalúa para producir un valor</text>

  <rect x="431" y="132" width="323" height="100" rx="6" fill="#0d1117"/>
  <text x="443" y="154" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">// Expresiones — JS las calcula</text>
  <text x="443" y="175" font-size="11" font-family="'Courier New', monospace" fill="#90cdf4">2 + 3</text>
  <text x="500" y="175" font-size="11" font-family="'Courier New', monospace" fill="#718096">        // evalúa a → </text>
  <text x="640" y="175" font-size="11" font-family="'Courier New', monospace" fill="#90cdf4">5</text>
  <text x="443" y="193" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">'Hola' + ' ' + 'Ana'</text>
  <text x="443" y="211" font-size="11" font-family="'Courier New', monospace" fill="#718096">// evalúa a → </text>
  <text x="562" y="211" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">'Hola Ana'</text>

  <rect x="431" y="244" width="323" height="88" rx="6" fill="#1c4532" opacity="0.4"/>
  <text x="592" y="268" text-anchor="middle" font-size="13" font-weight="700" fill="#9ae6b4">Analogía</text>
  <text x="592" y="288" text-anchor="middle" font-size="12" fill="#a0aec0">Como una pregunta de matemáticas:</text>
  <text x="592" y="306" text-anchor="middle" font-size="12" fill="#a0aec0">"¿Cuánto es 10 + 5?"  →  15</text>
  <text x="592" y="322" text-anchor="middle" font-size="11" fill="#68d391">Hay un proceso de evaluación.</text>

  <!-- ══════════ FLECHA central ══════════ -->
  <text x="400" y="220" text-anchor="middle" font-size="24" fill="#F0DB4F">⇄</text>
  <text x="400" y="240" text-anchor="middle" font-size="10" fill="#718096">produce</text>
  <text x="400" y="254" text-anchor="middle" font-size="10" fill="#F0DB4F">un valor</text>

  <!-- ══════════ PANEL INFERIOR — console.log evalúa ══════════ -->
  <rect x="30" y="360" width="740" height="88" rx="10" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="400" y="382" text-anchor="middle" font-size="13" font-weight="700" fill="#F0DB4F">console.log() evalúa expresiones automáticamente</text>

  <rect x="46" y="392" width="338" height="42" rx="6" fill="#0d1117"/>
  <text x="58" y="410" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">console</text>
  <text x="112" y="410" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">.</text>
  <text x="118" y="410" font-size="11" font-family="'Courier New', monospace" fill="#68d391">log</text>
  <text x="145" y="410" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">(</text>
  <text x="152" y="410" font-size="11" font-family="'Courier New', monospace" fill="#90cdf4">10 * 5</text>
  <text x="200" y="410" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">)</text>
  <text x="58" y="426" font-size="11" font-family="'Courier New', monospace" fill="#718096">// muestra: </text>
  <text x="143" y="426" font-size="11" font-family="'Courier New', monospace" fill="#90cdf4">50</text>
  <text x="165" y="426" font-size="11" font-family="'Courier New', monospace" fill="#718096">← JS evaluó 10 * 5 primero</text>

  <rect x="416" y="392" width="338" height="42" rx="6" fill="#0d1117"/>
  <text x="428" y="410" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">console</text>
  <text x="482" y="410" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">.</text>
  <text x="488" y="410" font-size="11" font-family="'Courier New', monospace" fill="#68d391">log</text>
  <text x="515" y="410" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">(</text>
  <text x="522" y="410" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">`Tengo ${"${"}{"}age{"}"} años`</text>
  <text x="680" y="410" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">)</text>
  <text x="428" y="426" font-size="11" font-family="'Courier New', monospace" fill="#718096">// muestra: </text>
  <text x="513" y="426" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">"Tengo 25 años"</text>

</svg>
