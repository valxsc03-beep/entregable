<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" width="800" height="480" font-family="Inter, Roboto, 'Open Sans', system-ui, sans-serif">

  <!-- Fondo -->
  <rect width="800" height="480" fill="#1a1a2e" rx="12"/>

  <!-- Título -->
  <text x="400" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#F0DB4F">console.log() y Comentarios</text>
  <text x="400" y="64" text-anchor="middle" font-size="13" fill="#a0aec0">Cómo mostrar resultados y documentar tu código</text>

  <!-- ══════════ CONSOLE.LOG ══════════ -->
  <rect x="30" y="84" width="365" height="280" rx="10" fill="#16213e" stroke="#F0DB4F" stroke-width="2"/>
  <rect x="30" y="84" width="365" height="36" rx="10" fill="#2d3300"/>
  <rect x="30" y="106" width="365" height="14" fill="#2d3300"/>
  <text x="212" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#F0DB4F">console.log() — variantes</text>

  <!-- ventana código -->
  <rect x="46" y="130" width="333" height="220" rx="6" fill="#0d1117"/>

  <!-- console.log -->
  <text x="58" y="154" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">console</text>
  <text x="112" y="154" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">.</text>
  <text x="118" y="154" font-size="11" font-family="'Courier New', monospace" fill="#68d391">log</text>
  <text x="145" y="154" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">(</text>
  <text x="152" y="154" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">'Hola, mundo!'</text>
  <text x="269" y="154" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">)</text>
  <rect x="338" y="143" width="28" height="15" rx="3" fill="#2d3300"/>
  <text x="352" y="154" text-anchor="middle" font-size="9" fill="#F0DB4F">log</text>

  <!-- separador -->
  <line x1="58" y1="165" x2="362" y2="165" stroke="#2d3748" stroke-width="1"/>

  <!-- console.warn -->
  <text x="58" y="184" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">console</text>
  <text x="112" y="184" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">.</text>
  <text x="118" y="184" font-size="11" font-family="'Courier New', monospace" fill="#ed8936">warn</text>
  <text x="148" y="184" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">(</text>
  <text x="155" y="184" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">'Revisar esto'</text>
  <text x="258" y="184" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">)</text>
  <rect x="338" y="173" width="28" height="15" rx="3" fill="#7b4209"/>
  <text x="352" y="184" text-anchor="middle" font-size="9" fill="#ed8936">warn</text>

  <!-- console.error -->
  <text x="58" y="214" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">console</text>
  <text x="112" y="214" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">.</text>
  <text x="118" y="214" font-size="11" font-family="'Courier New', monospace" fill="#fc8181">error</text>
  <text x="152" y="214" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">(</text>
  <text x="159" y="214" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">'Algo salió mal'</text>
  <text x="274" y="214" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">)</text>
  <rect x="338" y="203" width="28" height="15" rx="3" fill="#742a2a"/>
  <text x="352" y="214" text-anchor="middle" font-size="9" fill="#fc8181">error</text>

  <!-- separador -->
  <line x1="58" y1="225" x2="362" y2="225" stroke="#2d3748" stroke-width="1"/>

  <!-- console.table -->
  <text x="58" y="244" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">console</text>
  <text x="112" y="244" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">.</text>
  <text x="118" y="244" font-size="11" font-family="'Courier New', monospace" fill="#90cdf4">table</text>
  <text x="154" y="244" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">(</text>
  <text x="160" y="244" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">['Ana', 'Luis']</text>
  <text x="279" y="244" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">)</text>
  <rect x="330" y="233" width="36" height="15" rx="3" fill="#1a365d"/>
  <text x="348" y="244" text-anchor="middle" font-size="9" fill="#90cdf4">table</text>

  <!-- multiples args -->
  <line x1="58" y1="256" x2="362" y2="256" stroke="#2d3748" stroke-width="1"/>
  <text x="58" y="276" font-size="11" font-family="'Courier New', monospace" fill="#F0DB4F">console</text>
  <text x="112" y="276" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">.</text>
  <text x="118" y="276" font-size="11" font-family="'Courier New', monospace" fill="#68d391">log</text>
  <text x="145" y="276" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">(</text>
  <text x="152" y="276" font-size="11" font-family="'Courier New', monospace" fill="#f6ad55">'Edad:'</text>
  <text x="204" y="276" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">, </text>
  <text x="218" y="276" font-size="11" font-family="'Courier New', monospace" fill="#90cdf4">25</text>
  <text x="234" y="276" font-size="11" font-family="'Courier New', monospace" fill="#e2e8f0">)</text>
  <text x="250" y="276" font-size="10" font-family="'Courier New', monospace" fill="#718096">→ Edad: 25</text>

  <!-- separador y output coloreado -->
  <line x1="58" y1="286" x2="362" y2="286" stroke="#2d3748" stroke-width="1"/>
  <rect x="58" y="298" width="50" height="12" rx="2" fill="#2d3300" opacity="0.8"/>
  <text x="83" y="308" text-anchor="middle" font-size="9" fill="#F0DB4F">log</text>
  <text x="120" y="308" font-size="9" fill="#718096">texto normal</text>
  <rect x="190" y="298" width="50" height="12" rx="2" fill="#7b4209" opacity="0.8"/>
  <text x="215" y="308" text-anchor="middle" font-size="9" fill="#ed8936">warn</text>
  <text x="252" y="308" font-size="9" fill="#718096">⚠ amarillo</text>
  <rect x="318" y="298" width="50" height="12" rx="2" fill="#742a2a" opacity="0.8"/>
  <text x="343" y="308" text-anchor="middle" font-size="9" fill="#fc8181">error</text>

  <!-- ══════════ COMENTARIOS ══════════ -->
  <rect x="405" y="84" width="365" height="280" rx="10" fill="#16213e" stroke="#9f7aea" stroke-width="2"/>
  <rect x="405" y="84" width="365" height="36" rx="10" fill="#322659"/>
  <rect x="405" y="106" width="365" height="14" fill="#322659"/>
  <text x="587" y="108" text-anchor="middle" font-size="13" font-weight="700" fill="#d6bcfa">Comentarios</text>

  <rect x="421" y="130" width="333" height="220" rx="6" fill="#0d1117"/>

  <!-- comentario de una linea -->
  <text x="433" y="152" font-size="11" fill="#718096" font-style="italic">// Tipos de comentarios en JavaScript</text>
  <text x="433" y="170" font-size="10" font-family="'Courier New', monospace" fill="#9f7aea">// Comentario de una línea</text>
  <rect x="550" y="177" width="140" height="13" rx="3" fill="#322659" opacity="0.6"/>
  <text x="620" y="187" text-anchor="middle" font-size="9" fill="#d6bcfa">usa // al inicio</text>

  <text x="433" y="200" font-size="10" font-family="'Courier New', monospace" fill="#68d391">const</text>
  <text x="480" y="200" font-size="10" font-family="'Courier New', monospace" fill="#e2e8f0"> age = </text>
  <text x="526" y="200" font-size="10" font-family="'Courier New', monospace" fill="#90cdf4">25</text>
  <text x="545" y="200" font-size="10" font-family="'Courier New', monospace" fill="#718096"> // edad del usuario</text>
  <rect x="550" y="207" width="140" height="13" rx="3" fill="#1a2744" opacity="0.6"/>
  <text x="620" y="217" text-anchor="middle" font-size="9" fill="#90cdf4">inline comment</text>

  <!-- separador -->
  <line x1="433" y1="228" x2="737" y2="228" stroke="#2d3748" stroke-width="1"/>

  <!-- comentario multilínea -->
  <text x="433" y="248" font-size="10" font-family="'Courier New', monospace" fill="#718096">/*</text>
  <rect x="455" y="253" width="160" height="13" rx="3" fill="#322659" opacity="0.6"/>
  <text x="535" y="263" text-anchor="middle" font-size="9" fill="#d6bcfa">abre con /*</text>
  <text x="433" y="268" font-size="10" font-family="'Courier New', monospace" fill="#718096">  Comentario</text>
  <text x="433" y="284" font-size="10" font-family="'Courier New', monospace" fill="#718096">  que ocupa</text>
  <text x="433" y="300" font-size="10" font-family="'Courier New', monospace" fill="#718096">  varias líneas</text>
  <text x="433" y="316" font-size="10" font-family="'Courier New', monospace" fill="#718096">*/</text>
  <rect x="455" y="320" width="160" height="13" rx="3" fill="#322659" opacity="0.6"/>
  <text x="535" y="330" text-anchor="middle" font-size="9" fill="#d6bcfa">cierra con */</text>

  <!-- regla -->
  <line x1="433" y1="340" x2="737" y2="340" stroke="#2d3748" stroke-width="1"/>

  <!-- cuándo comentar -->
  <text x="433" y="358" font-size="10" fill="#fc8181">✗</text>
  <text x="448" y="358" font-size="10" font-family="'Courier New', monospace" fill="#718096">const x = 5  // asigna 5 a x</text>

  <text x="433" y="338" font-size="10" fill="#68d391">✓</text>
  <line x1="433" y1="340" x2="737" y2="340" stroke="#2d3748" stroke-width="0"/>

  <!-- ══════════ REGLA INFERIOR ══════════ -->
  <rect x="30" y="382" width="740" height="80" rx="8" fill="#16213e" stroke="#2d3748" stroke-width="1"/>
  <text x="400" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#a0aec0">Regla de oro para comentar</text>

  <rect x="46" y="416" width="330" height="34" rx="6" fill="#2d3748"/>
  <text x="60" y="430" font-size="11" fill="#fc8181">✗  </text>
  <text x="76" y="430" font-size="10" font-family="'Courier New', monospace" fill="#718096">// suma dos números</text>
  <text x="60" y="446" font-size="10" font-family="'Courier New', monospace" fill="#718096">const result = a + b</text>

  <rect x="424" y="416" width="330" height="34" rx="6" fill="#1c4532"/>
  <text x="438" y="430" font-size="11" fill="#68d391">✓  </text>
  <text x="454" y="430" font-size="10" font-family="'Courier New', monospace" fill="#718096">// precio con IVA del 21% incluido</text>
  <text x="438" y="446" font-size="10" font-family="'Courier New', monospace" fill="#718096">const total = price * 1.21</text>

</svg>
