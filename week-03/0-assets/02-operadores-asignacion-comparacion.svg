<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <rect width="900" height="380" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="450" y="34" font-family="system-ui, sans-serif" font-size="21" font-weight="700" text-anchor="middle" fill="#f0db4f">Asignación y Comparación</text>
  <text x="450" y="54" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#888888">+= · -= · *= · /= · === · !== · &gt; · &lt;</text>

  <!-- Asignación compuesta -->
  <rect x="20" y="68" width="410" height="170" rx="8" fill="#16213e" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="225" y="91" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#42a5f5">Asignación Compuesta</text>
  <text x="225" y="108" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#888888">let stock = 100</text>

  <text x="40" y="133" font-family="'Courier New', monospace" font-size="12" fill="#f0db4f">stock += 30</text>
  <text x="200" y="133" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→ stock = stock + 30 = 130</text>
  <text x="40" y="153" font-family="'Courier New', monospace" font-size="12" fill="#f0db4f">stock -= 15</text>
  <text x="200" y="153" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→ stock = stock - 15 = 115</text>
  <text x="40" y="173" font-family="'Courier New', monospace" font-size="12" fill="#f0db4f">price *= 0.5</text>
  <text x="200" y="173" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→ price = price * 0.5</text>
  <text x="40" y="193" font-family="'Courier New', monospace" font-size="12" fill="#f0db4f">total /= 2</text>
  <text x="200" y="193" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→ total = total / 2</text>
  <text x="40" y="213" font-family="'Courier New', monospace" font-size="12" fill="#f0db4f">count %= 3</text>
  <text x="200" y="213" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→ count = count % 3</text>
  <text x="40" y="228" font-family="system-ui, sans-serif" font-size="10" fill="#888888">Equivalen a: x = x operador n</text>

  <!-- === vs == -->
  <rect x="450" y="68" width="430" height="170" rx="8" fill="#16213e" stroke="#f0db4f" stroke-width="1.5"/>
  <text x="665" y="91" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#f0db4f">=== vs ==</text>

  <rect x="462" y="100" width="196" height="124" rx="5" fill="#0d1b2a"/>
  <text x="560" y="120" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#4caf50">===  Estricto ✓</text>
  <text x="470" y="140" font-family="'Courier New', monospace" font-size="11" fill="#ffffff">5 === 5     → true</text>
  <text x="470" y="158" font-family="'Courier New', monospace" font-size="11" fill="#4caf50">5 === "5"   → false</text>
  <text x="470" y="176" font-family="system-ui, sans-serif" font-size="10" fill="#888888">compara valor Y tipo</text>
  <text x="470" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#4caf50">Siempre usa este</text>
  <text x="470" y="212" font-family="system-ui, sans-serif" font-size="10" fill="#4caf50">5 !== "5"   → true ✓</text>

  <rect x="668" y="100" width="196" height="124" rx="5" fill="#1a0a0a"/>
  <text x="766" y="120" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#ef5350">==  Abstracto ✗</text>
  <text x="676" y="140" font-family="'Courier New', monospace" font-size="11" fill="#ef5350">5 == "5"    → true</text>
  <text x="676" y="158" font-family="'Courier New', monospace" font-size="11" fill="#ef5350">0 == false  → true</text>
  <text x="676" y="176" font-family="system-ui, sans-serif" font-size="10" fill="#888888">convierte tipos antes</text>
  <text x="676" y="194" font-family="system-ui, sans-serif" font-size="10" fill="#ef5350">Causa bugs ocultos</text>
  <text x="676" y="212" font-family="system-ui, sans-serif" font-size="10" fill="#ef5350">Nunca uses esto</text>

  <!-- Operadores de orden -->
  <rect x="20" y="254" width="860" height="110" rx="8" fill="#16213e" stroke="#ab47bc" stroke-width="1.2"/>
  <text x="450" y="277" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ab47bc">Operadores de orden — devuelven true o false</text>

  <text x="50" y="305" font-family="'Courier New', monospace" font-size="12" fill="#4caf50">10 &gt; 5  → true</text>
  <text x="215" y="305" font-family="'Courier New', monospace" font-size="12" fill="#ef5350">10 &lt; 5  → false</text>
  <text x="380" y="305" font-family="'Courier New', monospace" font-size="12" fill="#4caf50">10 &gt;= 10 → true</text>
  <text x="555" y="305" font-family="'Courier New', monospace" font-size="12" fill="#ef5350">10 &lt;= 9  → false</text>

  <text x="50" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#f0db4f">mayor que</text>
  <text x="215" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#f0db4f">menor que</text>
  <text x="380" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#f0db4f">mayor o igual</text>
  <text x="555" y="330" font-family="system-ui, sans-serif" font-size="11" fill="#f0db4f">menor o igual</text>
  <text x="740" y="318" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#888888">Con strings compara</text>
  <text x="740" y="333" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#888888">orden alfabético</text>
</svg>
