<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <rect width="900" height="380" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="450" y="34" font-family="system-ui, sans-serif" font-size="21" font-weight="700" text-anchor="middle" fill="#f0db4f">Precedencia y Coerción Implícita</text>
  <text x="450" y="54" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle" fill="#888888">Orden de evaluación · coerción que causa bugs</text>

  <!-- Precedencia -->
  <rect x="20" y="68" width="395" height="200" rx="8" fill="#16213e" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="217" y="91" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#42a5f5">Precedencia (mayor → menor)</text>

  <text x="40" y="116" font-family="'Courier New', monospace" font-size="12" fill="#f0db4f">( )</text>
  <text x="130" y="116" font-family="system-ui, sans-serif" font-size="11" fill="#cccccc">Paréntesis — siempre primero</text>
  <text x="40" y="136" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">**</text>
  <text x="130" y="136" font-family="system-ui, sans-serif" font-size="11" fill="#cccccc">Potencia</text>
  <text x="40" y="156" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">* / %</text>
  <text x="130" y="156" font-family="system-ui, sans-serif" font-size="11" fill="#cccccc">Multiplicación, división, módulo</text>
  <text x="40" y="176" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">+ -</text>
  <text x="130" y="176" font-family="system-ui, sans-serif" font-size="11" fill="#cccccc">Suma y resta</text>
  <text x="40" y="196" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">&gt; &lt; &gt;= &lt;=</text>
  <text x="130" y="196" font-family="system-ui, sans-serif" font-size="11" fill="#cccccc">Comparación de orden</text>
  <text x="40" y="216" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">=== !==</text>
  <text x="130" y="216" font-family="system-ui, sans-serif" font-size="11" fill="#cccccc">Igualdad</text>
  <text x="40" y="236" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">&amp;&amp;  ||</text>
  <text x="130" y="236" font-family="system-ui, sans-serif" font-size="11" fill="#cccccc">Lógicos AND / OR</text>
  <text x="40" y="256" font-family="'Courier New', monospace" font-size="12" fill="#cccccc">= += -=</text>
  <text x="130" y="256" font-family="system-ui, sans-serif" font-size="11" fill="#888888">Asignación — siempre al final</text>

  <!-- Ejemplos de precedencia -->
  <rect x="435" y="68" width="445" height="200" rx="8" fill="#16213e" stroke="#ab47bc" stroke-width="1.5"/>
  <text x="657" y="91" font-family="system-ui, sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#ab47bc">Ejemplos</text>

  <text x="455" y="116" font-family="'Courier New', monospace" font-size="12" fill="#ef5350">2 + 3 * 4</text>
  <text x="600" y="116" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→</text>
  <text x="620" y="116" font-family="'Courier New', monospace" font-size="12" fill="#4caf50">14</text>
  <text x="660" y="116" font-family="system-ui, sans-serif" font-size="10" fill="#888888">(* antes que +)</text>

  <text x="455" y="140" font-family="'Courier New', monospace" font-size="12" fill="#4caf50">(2 + 3) * 4</text>
  <text x="600" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→</text>
  <text x="620" y="140" font-family="'Courier New', monospace" font-size="12" fill="#4caf50">20</text>
  <text x="660" y="140" font-family="system-ui, sans-serif" font-size="10" fill="#888888">(paréntesis primero)</text>

  <text x="455" y="164" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">10 - 2 ** 3</text>
  <text x="600" y="164" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→</text>
  <text x="620" y="164" font-family="'Courier New', monospace" font-size="12" fill="#4caf50">2</text>
  <text x="660" y="164" font-family="system-ui, sans-serif" font-size="10" fill="#888888">(** antes que -)</text>

  <text x="455" y="188" font-family="'Courier New', monospace" font-size="12" fill="#ffffff">true || x &gt; 5</text>
  <text x="600" y="188" font-family="system-ui, sans-serif" font-size="11" fill="#888888">→</text>
  <text x="620" y="188" font-family="'Courier New', monospace" font-size="12" fill="#4caf50">true</text>
  <text x="660" y="188" font-family="system-ui, sans-serif" font-size="10" fill="#888888">(&gt; antes que ||)</text>

  <text x="455" y="222" font-family="system-ui, sans-serif" font-size="11" fill="#f0db4f">💡 Usa ( ) cuando la intención</text>
  <text x="455" y="238" font-family="system-ui, sans-serif" font-size="11" fill="#f0db4f">   no sea inmediatamente obvia</text>
  <text x="455" y="256" font-family="system-ui, sans-serif" font-size="11" fill="#888888">   Priorizan legibilidad</text>

  <!-- Coerción implícita -->
  <rect x="20" y="286" width="860" height="80" rx="8" fill="#16213e" stroke="#ef5350" stroke-width="1.5"/>
  <text x="450" y="308" font-family="system-ui, sans-serif" font-size="13" font-weight="700" text-anchor="middle" fill="#ef5350">⚠️  Coerción Implícita — causa bugs</text>
  <text x="40" y="332" font-family="'Courier New', monospace" font-size="11" fill="#ef5350">"5" + 10 = "510"</text>
  <text x="200" y="332" font-family="'Courier New', monospace" font-size="11" fill="#4caf50">Number("5") + 10 = 15</text>
  <text x="420" y="332" font-family="'Courier New', monospace" font-size="11" fill="#ef5350">1 + 2 + "3" = "33"</text>
  <text x="40" y="350" font-family="system-ui, sans-serif" font-size="10" fill="#888888">implícita ✗</text>
  <text x="200" y="350" font-family="system-ui, sans-serif" font-size="10" fill="#4caf50">explícita ✓</text>
  <text x="600" y="332" font-family="system-ui, sans-serif" font-size="10" fill="#888888">Solución: convierte antes de operar</text>
  <text x="600" y="348" font-family="'Courier New', monospace" font-size="10" fill="#888888">Number() · String() · Boolean()</text>
</svg>
