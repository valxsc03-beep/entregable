<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400">
  <rect width="900" height="400" fill="#1a1a2e"/>

  <!-- Título -->
  <text x="450" y="36" font-family="system-ui, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#f0db4f">Conversión de Tipos</text>
  <text x="450" y="57" font-family="system-ui, sans-serif" font-size="13" text-anchor="middle" fill="#888888">Number() · String() · Boolean()</text>

  <!-- Number() -->
  <rect x="30" y="74" width="260" height="230" rx="10" fill="#16213e" stroke="#4fc3f7" stroke-width="1.5"/>
  <rect x="30" y="74" width="260" height="38" rx="10" fill="#4fc3f7"/>
  <rect x="30" y="100" width="260" height="12" fill="#4fc3f7"/>
  <text x="160" y="99" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#1a1a2e">Number()</text>
  <text x="160" y="132" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#888888">Convierte a número</text>

  <text x="50" y="158" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Number('42')      → <tspan fill="#4fc3f7">42</tspan></text>
  <text x="50" y="176" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Number('3.14')    → <tspan fill="#4fc3f7">3.14</tspan></text>
  <text x="50" y="194" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Number('')        → <tspan fill="#4fc3f7">0</tspan></text>
  <text x="50" y="212" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Number(true)      → <tspan fill="#4fc3f7">1</tspan></text>
  <text x="50" y="230" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Number(false)     → <tspan fill="#4fc3f7">0</tspan></text>
  <text x="50" y="248" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Number(null)      → <tspan fill="#4fc3f7">0</tspan></text>
  <text x="50" y="266" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Number('hola')    → <tspan fill="#ff7043">NaN</tspan></text>
  <text x="50" y="288" font-family="system-ui, sans-serif" font-size="11" fill="#888888">NaN = Not a Number</text>

  <!-- String() -->
  <rect x="320" y="74" width="260" height="230" rx="10" fill="#16213e" stroke="#f0db4f" stroke-width="1.5"/>
  <rect x="320" y="74" width="260" height="38" rx="10" fill="#f0db4f"/>
  <rect x="320" y="100" width="260" height="12" fill="#f0db4f"/>
  <text x="450" y="99" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#1a1a2e">String()</text>
  <text x="450" y="132" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#888888">Convierte a texto</text>

  <text x="340" y="158" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">String(42)         → <tspan fill="#f0db4f">"42"</tspan></text>
  <text x="340" y="176" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">String(3.14)       → <tspan fill="#f0db4f">"3.14"</tspan></text>
  <text x="340" y="194" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">String(true)       → <tspan fill="#f0db4f">"true"</tspan></text>
  <text x="340" y="212" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">String(false)      → <tspan fill="#f0db4f">"false"</tspan></text>
  <text x="340" y="230" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">String(null)       → <tspan fill="#f0db4f">"null"</tspan></text>
  <text x="340" y="248" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">String(undefined)  → <tspan fill="#f0db4f">"undefined"</tspan></text>
  <text x="340" y="266" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">String(-100)       → <tspan fill="#f0db4f">"-100"</tspan></text>
  <text x="340" y="288" font-family="system-ui, sans-serif" font-size="11" fill="#888888">Siempre produce un string</text>

  <!-- Boolean() -->
  <rect x="610" y="74" width="260" height="230" rx="10" fill="#16213e" stroke="#ab47bc" stroke-width="1.5"/>
  <rect x="610" y="74" width="260" height="38" rx="10" fill="#ab47bc"/>
  <rect x="610" y="100" width="260" height="12" fill="#ab47bc"/>
  <text x="740" y="99" font-family="system-ui, sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#ffffff">Boolean()</text>
  <text x="740" y="132" font-family="system-ui, sans-serif" font-size="11" text-anchor="middle" fill="#888888">Convierte a verdadero/falso</text>

  <text x="630" y="152" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ef5350">Falsy → false:</text>
  <text x="630" y="170" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Boolean(0)         → <tspan fill="#ef5350">false</tspan></text>
  <text x="630" y="188" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Boolean('')        → <tspan fill="#ef5350">false</tspan></text>
  <text x="630" y="206" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Boolean(null)      → <tspan fill="#ef5350">false</tspan></text>
  <text x="630" y="224" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Boolean(undefined) → <tspan fill="#ef5350">false</tspan></text>
  <text x="630" y="242" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Boolean(NaN)       → <tspan fill="#ef5350">false</tspan></text>
  <text x="630" y="258" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#4caf50">Truthy → true:</text>
  <text x="630" y="276" font-family="'Courier New', monospace" font-size="11" fill="#e0e0e0">Boolean(1) / ('x') → <tspan fill="#4caf50">true</tspan></text>
  <text x="630" y="294" font-family="system-ui, sans-serif" font-size="11" fill="#888888">Todo lo demás es truthy</text>

  <!-- Footer -->
  <rect x="30" y="322" width="840" height="60" rx="8" fill="#16213e" stroke="#2a2a4a" stroke-width="1"/>
  <text x="450" y="343" font-family="system-ui, sans-serif" font-size="12" font-weight="700" text-anchor="middle" fill="#f0db4f">⚠️  Coerción implícita vs conversión explícita</text>
  <text x="450" y="362" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#e0e0e0">'10' + 5  →  "105"  (coerción implícita — evitar)</text>
  <text x="450" y="378" font-family="'Courier New', monospace" font-size="11" text-anchor="middle" fill="#4caf50">Number('10') + 5  →  15  (conversión explícita — preferir)</text>
</svg>
