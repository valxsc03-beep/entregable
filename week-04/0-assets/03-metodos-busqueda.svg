<svg width="700" height="420" viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="700" height="420" fill="#1a1a2e"/>

  <!-- Título -->
  <rect x="20" y="16" width="660" height="44" rx="6" fill="#16213e"/>
  <text x="350" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#F0DB4F">Métodos de Búsqueda y Extracción</text>

  <!-- includes / startsWith / endsWith -->
  <rect x="20" y="76" width="660" height="76" rx="6" fill="#16213e"/>
  <text x="36" y="98" font-size="12" font-weight="700" fill="#F0DB4F">Búsqueda — devuelven boolean</text>

  <rect x="36" y="106" width="188" height="36" rx="3" fill="#0f3460"/>
  <text x="46" y="120" font-size="11" fill="#a0aec0">.includes('ES2023')</text>
  <text x="46" y="135" font-size="12" fill="#68d391">true / false</text>

  <rect x="238" y="106" width="196" height="36" rx="3" fill="#0f3460"/>
  <text x="248" y="120" font-size="11" fill="#a0aec0">.startsWith('reporte')</text>
  <text x="248" y="135" font-size="12" fill="#68d391">true / false</text>

  <rect x="448" y="106" width="216" height="36" rx="3" fill="#0f3460"/>
  <text x="458" y="120" font-size="11" fill="#a0aec0">.endsWith('.pdf')</text>
  <text x="458" y="135" font-size="12" fill="#68d391">true / false</text>

  <!-- indexOf -->
  <rect x="20" y="166" width="320" height="80" rx="6" fill="#16213e"/>
  <text x="36" y="188" font-size="12" font-weight="700" fill="#F0DB4F">.indexOf(texto)</text>
  <text x="36" y="208" font-size="12" fill="#a0aec0">Devuelve la posición (índice) o</text>
  <text x="260" y="208" font-size="12" font-weight="700" fill="#fc8181">-1</text>
  <text x="275" y="208" font-size="12" fill="#a0aec0">si no existe</text>
  <rect x="36" y="214" width="280" height="24" rx="3" fill="#0f3460"/>
  <text x="46" y="230" font-size="12" fill="#e2e8f0">'Hola mundo'.indexOf('mundo')  →  5</text>

  <!-- slice -->
  <rect x="360" y="166" width="320" height="80" rx="6" fill="#16213e"/>
  <text x="376" y="188" font-size="12" font-weight="700" fill="#F0DB4F">.slice(inicio, fin)</text>
  <text x="376" y="208" font-size="12" fill="#a0aec0">Extrae desde inicio hasta fin (sin incluirlo)</text>
  <rect x="376" y="214" width="288" height="24" rx="3" fill="#0f3460"/>
  <text x="386" y="230" font-size="12" fill="#e2e8f0">'JavaScript'.slice(4, 10)  →  'Script'</text>

  <!-- Diagrama slice visual -->
  <rect x="20" y="260" width="660" height="80" rx="6" fill="#16213e"/>
  <text x="36" y="280" font-size="12" font-weight="700" fill="#F0DB4F">Visualización de .slice()</text>

  <text x="36" y="302" font-size="13" fill="#e2e8f0">'</text>
  <!-- J -->
  <rect x="48" y="288" width="30" height="24" rx="2" fill="#0f3460" stroke="#2d3748"/>
  <text x="63" y="305" text-anchor="middle" font-size="13" fill="#e2e8f0">J</text>
  <!-- a -->
  <rect x="82" y="288" width="30" height="24" rx="2" fill="#0f3460" stroke="#2d3748"/>
  <text x="97" y="305" text-anchor="middle" font-size="13" fill="#e2e8f0">a</text>
  <!-- v -->
  <rect x="116" y="288" width="30" height="24" rx="2" fill="#0f3460" stroke="#2d3748"/>
  <text x="131" y="305" text-anchor="middle" font-size="13" fill="#e2e8f0">v</text>
  <!-- a -->
  <rect x="150" y="288" width="30" height="24" rx="2" fill="#0f3460" stroke="#2d3748"/>
  <text x="165" y="305" text-anchor="middle" font-size="13" fill="#e2e8f0">a</text>
  <!-- S — inicio slice (4) -->
  <rect x="184" y="288" width="30" height="24" rx="2" fill="#2a4365" stroke="#F0DB4F" stroke-width="2"/>
  <text x="199" y="305" text-anchor="middle" font-size="13" fill="#F0DB4F">S</text>
  <!-- c -->
  <rect x="218" y="288" width="30" height="24" rx="2" fill="#2a4365" stroke="#F0DB4F" stroke-width="2"/>
  <text x="233" y="305" text-anchor="middle" font-size="13" fill="#F0DB4F">c</text>
  <!-- r -->
  <rect x="252" y="288" width="30" height="24" rx="2" fill="#2a4365" stroke="#F0DB4F" stroke-width="2"/>
  <text x="267" y="305" text-anchor="middle" font-size="13" fill="#F0DB4F">r</text>
  <!-- i -->
  <rect x="286" y="288" width="30" height="24" rx="2" fill="#2a4365" stroke="#F0DB4F" stroke-width="2"/>
  <text x="301" y="305" text-anchor="middle" font-size="13" fill="#F0DB4F">i</text>
  <!-- p -->
  <rect x="320" y="288" width="30" height="24" rx="2" fill="#2a4365" stroke="#F0DB4F" stroke-width="2"/>
  <text x="335" y="305" text-anchor="middle" font-size="13" fill="#F0DB4F">p</text>
  <!-- t — fin slice (9, no incluido 10) -->
  <rect x="354" y="288" width="30" height="24" rx="2" fill="#2a4365" stroke="#F0DB4F" stroke-width="2"/>
  <text x="369" y="305" text-anchor="middle" font-size="13" fill="#F0DB4F">t</text>
  <text x="388" y="302" font-size="13" fill="#e2e8f0">'</text>

  <text x="410" y="305" font-size="12" fill="#68d391">.slice(4, 10) → 'Script'</text>
  <text x="184" y="325" font-size="11" fill="#F0DB4F">↑ índice 4</text>
  <text x="354" y="325" font-size="11" fill="#718096">↑ índice 9</text>

  <!-- split -->
  <rect x="20" y="354" width="660" height="44" rx="6" fill="#16213e"/>
  <text x="36" y="374" font-size="12" font-weight="700" fill="#F0DB4F">.split(separador)</text>
  <text x="160" y="374" font-size="12" fill="#a0aec0">Divide el string en un array →</text>
  <rect x="376" y="360" width="288" height="24" rx="3" fill="#0f3460"/>
  <text x="386" y="376" font-size="12" fill="#68d391">'a,b,c'.split(',')  →  ['a', 'b', 'c']</text>

  <!-- Footer -->
  <text x="350" y="416" text-anchor="middle" font-size="11" fill="#4a5568">Bootcamp JavaScript ES2023 — Semana 04</text>
</svg>
