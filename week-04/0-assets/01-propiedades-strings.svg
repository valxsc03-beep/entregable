<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Roboto, Open Sans, system-ui, sans-serif">
  <!-- Fondo -->
  <rect width="700" height="380" fill="#1a1a2e"/>

  <!-- Título -->
  <rect x="20" y="16" width="660" height="44" rx="6" fill="#16213e"/>
  <text x="350" y="44" text-anchor="middle" font-size="18" font-weight="700" fill="#F0DB4F">Strings — Propiedades y Acceso por Índice</text>

  <!-- String visual -->
  <text x="30" y="96" font-size="13" fill="#a0aec0">String:</text>
  <text x="110" y="96" font-size="14" font-weight="700" fill="#F0DB4F">'JavaScript'</text>

  <!-- Celdas de caracteres -->
  <g transform="translate(30, 110)">
    <!-- Etiquetas de índice -->
    <text x="17"  y="14" text-anchor="middle" font-size="11" fill="#718096">0</text>
    <text x="77"  y="14" text-anchor="middle" font-size="11" fill="#718096">1</text>
    <text x="137" y="14" text-anchor="middle" font-size="11" fill="#718096">2</text>
    <text x="197" y="14" text-anchor="middle" font-size="11" fill="#718096">3</text>
    <text x="257" y="14" text-anchor="middle" font-size="11" fill="#718096">4</text>
    <text x="317" y="14" text-anchor="middle" font-size="11" fill="#718096">5</text>
    <text x="377" y="14" text-anchor="middle" font-size="11" fill="#718096">6</text>
    <text x="437" y="14" text-anchor="middle" font-size="11" fill="#718096">7</text>
    <text x="497" y="14" text-anchor="middle" font-size="11" fill="#718096">8</text>
    <text x="557" y="14" text-anchor="middle" font-size="11" fill="#718096">9</text>

    <!-- Celdas -->
    <rect x="0"   y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#F0DB4F" stroke-width="1.5"/>
    <rect x="60"  y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="120" y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="180" y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="240" y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="300" y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="360" y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="420" y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="480" y="20" width="55" height="46" rx="4" fill="#0f3460" stroke="#2d3748" stroke-width="1"/>
    <rect x="540" y="20" width="55" height="46" rx="4" fill="#16213e" stroke="#F0DB4F" stroke-width="1.5"/>

    <!-- Caracteres -->
    <text x="27"  y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#F0DB4F">J</text>
    <text x="87"  y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">a</text>
    <text x="147" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">v</text>
    <text x="207" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">a</text>
    <text x="267" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">S</text>
    <text x="327" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">c</text>
    <text x="387" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">r</text>
    <text x="447" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">i</text>
    <text x="507" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#e2e8f0">p</text>
    <text x="567" y="48" text-anchor="middle" font-size="20" font-weight="700" fill="#F0DB4F">t</text>

    <!-- Etiqueta length -->
    <text x="628" y="44" text-anchor="start" font-size="12" fill="#68d391">.length = 10</text>
  </g>

  <!-- Reglas -->
  <rect x="20" y="200" width="660" height="140" rx="6" fill="#16213e"/>
  <text x="40" y="224" font-size="13" font-weight="700" fill="#F0DB4F">Reglas clave</text>

  <text x="40" y="248" font-size="13" fill="#e2e8f0">El índice empieza en</text>
  <text x="196" y="248" font-size="13" font-weight="700" fill="#F0DB4F">0</text>
  <text x="210" y="248" font-size="13" fill="#e2e8f0">, no en 1</text>

  <text x="40" y="272" font-size="13" fill="#e2e8f0">El último índice es</text>
  <text x="192" y="272" font-size="13" font-weight="700" fill="#F0DB4F">.length - 1</text>

  <text x="40" y="296" font-size="13" fill="#e2e8f0">Acceso:</text>
  <rect x="104" y="280" width="160" height="22" rx="3" fill="#0f3460"/>
  <text x="114" y="296" font-size="13" fill="#68d391">word[0]  word[word.length-1]</text>

  <text x="40" y="320" font-size="13" fill="#e2e8f0">Los strings son</text>
  <text x="160" y="320" font-size="13" font-weight="700" fill="#fc8181">inmutables</text>
  <text x="234" y="320" font-size="13" fill="#e2e8f0">— no se puede cambiar un carácter</text>

  <!-- Footer -->
  <text x="350" y="368" text-anchor="middle" font-size="11" fill="#4a5568">Bootcamp JavaScript ES2023 — Semana 04</text>
</svg>
